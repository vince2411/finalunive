<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sin conexión | Universitarios FC</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    .offline-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: var(--space-8);
      background: var(--color-bg);
    }
    .offline-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-2xl);
      padding: var(--space-10);
      max-width: 480px;
      box-shadow: var(--shadow-xl);
    }
    .offline-icon { font-size: 4rem; margin-bottom: var(--space-6); }
    .offline-card h1 { font-size: var(--text-2xl); margin-bottom: var(--space-3); }
    .offline-card p { margin-bottom: var(--space-6); color: var(--color-text-muted); }
    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      padding: 0.75rem 1.5rem;
      background: var(--color-primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-lg);
      font-size: var(--text-base);
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .retry-btn:hover {
      background: var(--color-primary-hover);
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-card">
      <div class="offline-icon">📡</div>
      <h1>Sin conexión</h1>
      <p>No hay conexión a internet disponible. Verifica tu red e intenta nuevamente.</p>
      <button class="retry-btn" onclick="window.location.reload()">
        🔄 Reintentar
      </button>
    </div>
  </div>
</body>
</html>
